{% extends "layout.html" %}
{% block content %}
	<div class="container-fluid g-0">
		<div class="d-flex">
			<nav class="py-3 vh-100 flex-shrink-0 ">
            <p class="text-center fw-bold me-3 mt-4 pt-4">
                 <i class="bi bi-gear-fill ms-2"></i> Paramètres 
            </p>
            <div class="nav flex-column">
        
                    <a class="nav-link nav-settings text-decoration-none" href="/parametres/compte">Compte</a>
                    {% if session.role_id == 1 %}
                    <a class="nav-link nav-settings text-decoration-none" href="/parametres/utilisateurs">Utilisateurs</a>
                    {% endif %}
            
            </div>
            </nav>

            <div class="flex-grow-1 px-md-4 py-1 bg-light">
                <div class="d-flex justify-content-between align-items-center">
                    <div id="alert-container" class="text-end"></div>
                </div>
                <div id="content-container" >
                    {{ section | safe }}
                    <div class="response-message"></div>
                </div>
            </div>
	    </div>
	</div>
	<script type="module" src="/js/script.js"></script>
	<script type="module" src="/js/passwordGenerator.js"></script>
{% endblock %}
