<div class="container mt-5">


    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Gestion du compte utilisateur</h2>
            <p class="text-muted mb-0">Modifier les informations et les accès de l'utilisateur.</p>
        </div>
        <a href="/parametres/utilisateurs" class="btn btn-outline-secondary shadow-sm">
            Retour à la liste
        </a>
    </div>

    <!-- modification informations générales -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <h4 class="card-title mb-3">
                Utilisateur : <span class="text-primary">{{ utilisateur.username }}</span>
            </h4>
            <h5>ID: <span class="text-primary">{{ utilisateur.id }}</span></h5>

            <form id="form-edit-utilisateur" class="mt-3" method="post" data-form-user-id="{{ utilisateur.id }}">
                <div class="row g-3"> 
                    <div class="col-md-6">
                        <label for="roleSelect" class="form-label fw-semibold">Rôle :</label>
                        <select class="form-select" id="roleSelect" name="role">
                            <option value="1" {% if utilisateur.role_id == 1 %}selected{% endif %}>Admin</option>
                            <option value="2" {% if utilisateur.role_id == 2 %}selected{% endif %}>Régulier</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="etatSelect" class="form-label fw-semibold">État :</label>
                        <select class="form-select" id="etatSelect" name="etat">
                            <option value="1" {% if utilisateur.etat_id == 1 %}selected{% endif %}>Actif</option>
                            <option value="2" {% if utilisateur.etat_id == 2 %}selected{% endif %}>Suspendu</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end gap-2">
                    <button id="btn-save-edit-user" type="submit" class="btn btn-primary px-4">
                        Sauvegarder
                    </button>

                </div>
            </form>
        </div>
    </div>

    <!-- modification du mot de passe -->
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h5 class="fw-bold mb-3">Modifier le mot de passe</h5>

            <form id="form-edit-password" data-form-user-id="{{ utilisateur.id }}" >
                <div class="mb-3">
                    <label for="edit-password" class="form-label">Nouveau mot de passe :</label>
                    <div class="input-group password-container">
                        <input type="text" id="edit-password" class="form-control" name="nouveau-mot-de-passe" placeholder="">
                        <button type="button" id="btn-generate-password" class="btn btn-outline-secondary">
                            Générer
                        </button>
                        <button type="button" id="btn-copy-password" class="btn btn-outline-secondary">
                            Copier
                        </button>
                    </div>
                    <div id="passwordHelpBlock" class="form-text text-muted">
                        Le mot de passe doit contenir au moins 15 caractères.
                    </div>
                </div>

                <div class="text-end">
                    <button id="btn-save-edit-password" type="submit" class="btn btn-primary px-4">
                        Changer le mot de passe
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
